<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>寵物年齡換算器｜互動可愛版</title>

    <meta name="description" content="可愛互動式寵物年齡換算工具，支援狗狗與貓咪年齡轉換，滑鼠點擊會出現可愛肉球動畫與按鈕彈跳效果，適合手機與桌機使用。">

    <style>
        * {
            box-sizing: border-box;
            font-family: "Microsoft JhengHei", Arial, sans-serif;
        }

        body {

            margin: 0;
            padding: 0;

            background-image:
                url("cat3.png");

            background-size: cover;
            background-position: center;

            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            overflow-x: hidden;
        }

        h1 {
            text-align: center;
            color: #ff6b6b;
        }

        /* 卡片 */

        .container {

            width: 95%;
            max-width: 480px;

            padding: 30px;

            border-radius: 25px;

            background: rgba(255, 255, 255, 0.88);

            backdrop-filter: blur(8px);

            box-shadow:
                0 10px 25px rgba(0, 0, 0, 0.2);
        }

        label {
            font-weight: bold;
            margin-top: 15px;
            display: block;
        }

        select,
        input {

            width: 100%;

            padding: 12px;

            margin-top: 8px;

            border-radius: 12px;

            border: 2px solid #ffd6d6;

            font-size: 16px;
        }

        /* ===== 可愛按鈕 ===== */

        button {

            width: 100%;

            padding: 16px;

            margin-top: 20px;

            border: none;

            border-radius: 50px;

            font-size: 18px;

            cursor: pointer;

            color: white;

            background:
                linear-gradient(135deg,
                    #ff9a9e,
                    #fad0c4);

            box-shadow:
                0 6px 0 #e57373,
                0 10px 20px rgba(0, 0, 0, 0.2);

            transition: 0.15s;
        }

        /* Hover */

        button:hover {

            transform: scale(1.05);
        }

        /* 點擊動畫 */

        button:active {

            transform:
                scale(0.95) translateY(4px);

            box-shadow:
                0 2px 0 #e57373;
        }

        /* ===== 結果 ===== */

        .result {

            margin-top: 25px;

            padding: 20px;

            border-radius: 15px;

            background: #fff0f0;

            text-align: center;

            font-size: 20px;

            color: #d6336c;

            display: none;
        }

        /* ===== 愛心動畫 ===== */

        .heart {

            position: absolute;

            font-size: 22px;

            animation:
                floatUp 1s ease-out forwards;

            pointer-events: none;
        }

        @keyframes floatUp {

            0% {
                opacity: 1;
                transform: translateY(0);
            }

            100% {
                opacity: 0;
                transform: translateY(-80px);
            }
        }

        /* ===== 肉球 ===== */

        .paw {

            position: absolute;

            font-size: 26px;

            animation:
                fadeOut 1.2s ease-out forwards;

            pointer-events: none;
        }

        @keyframes fadeOut {

            0% {
                opacity: 1;
                transform: scale(1);
            }

            100% {
                opacity: 0;
                transform: scale(1.8);
            }
        }

        /* RWD */

        @media (max-width:768px) {

            .container {
                padding: 22px;
            }

            h1 {
                font-size: 24px;
            }

        }
    </style>
</head>

<body>

    <div class="container">

        <h1>🐾 寵物年齡換算器</h1>

        <label>請選擇寵物種類：</label>

        <select id="petType">
            <option value="cat">貓咪</option>
            <option value="dog">狗狗</option>
        </select>

        <label id="dogFormulaLabel" style="display:none;">
            狗狗換算方式：
        </label>

        <select id="dogFormula" style="display:none;">

            <option value="normal">
                一般公式
            </option>

            <option value="science">
                科學公式
            </option>

        </select>

        <label>
            請輸入寵物年齡：
        </label>

        <input type="number" id="age" placeholder="例如：3">

        <button onclick="calculateAge(event)">
            🐾 點我換算
        </button>

        <div class="result" id="result">
        </div>

    </div>

    <script>

        /* 顯示狗狗公式 */

        document
            .getElementById("petType")
            .addEventListener(
                "change",
                function () {

                    let pet =
                        this.value;

                    let dog =
                        document.getElementById(
                            "dogFormula");

                    let label =
                        document.getElementById(
                            "dogFormulaLabel");

                    if (pet === "dog") {

                        dog.style.display = "block";
                        label.style.display = "block";

                    } else {

                        dog.style.display = "none";
                        label.style.display = "none";
                    }

                });


        /* ===== 計算 ===== */

        function calculateAge(event) {

            createHearts(event);

            let petType =
                document.getElementById(
                    "petType"
                ).value;

            let age =
                parseFloat(
                    document.getElementById(
                        "age"
                    ).value
                );

            let result =
                document.getElementById(
                    "result"
                );

            if (isNaN(age)) {

                alert("請輸入年齡");
                return;
            }

            let humanAge;

            if (petType === "cat") {

                if (age === 1)
                    humanAge = 15;

                else if (age === 2)
                    humanAge = 24;

                else if (age > 2)
                    humanAge =
                        24 + (age - 2) * 4;

                else
                    humanAge =
                        age * 15;

                result.innerHTML =
                    "🐱 約等於 <strong>" +
                    Math.round(
                        humanAge
                    ) +
                    "</strong> 歲";

            }


            if (petType === "dog") {

                let formula =
                    document.getElementById(
                        "dogFormula"
                    ).value;

                if (formula === "normal") {

                    if (age === 1)
                        humanAge = 15;

                    else if (age === 2)
                        humanAge = 24;

                    else if (age > 2)
                        humanAge =
                            24 + (age - 2) * 5;

                    else
                        humanAge =
                            age * 15;

                }

                if (formula === "science") {

                    humanAge =
                        16 * Math.log(age) + 31;
                }

                result.innerHTML =
                    "🐶 約等於 <strong>" +
                    Math.round(
                        humanAge
                    ) +
                    "</strong> 歲";

            }

            result.style.display =
                "block";

        }


        /* ===== 按鈕愛心動畫 ===== */

        function createHearts(event) {

            for (let i = 0; i < 5; i++) {

                let heart =
                    document.createElement(
                        "div");

                heart.className =
                    "heart";

                heart.innerHTML = "❤️";

                heart.style.left =
                    event.clientX +
                    (Math.random() * 40 - 20)
                    + "px";

                heart.style.top =
                    event.clientY +
                    "px";

                document.body
                    .appendChild(heart);

                setTimeout(() => {

                    heart.remove();

                }, 1000);

            }

        }


        /* ===== 點擊任意位置 → 肉球 ===== */

        document
            .addEventListener(
                "click",
                function (e) {

                    let paw =
                        document.createElement(
                            "div");

                    paw.className =
                        "paw";

                    paw.innerHTML = "🐾";

                    paw.style.left =
                        e.clientX + "px";

                    paw.style.top =
                        e.clientY + "px";

                    document.body
                        .appendChild(paw);

                    setTimeout(() => {

                        paw.remove();

                    }, 1200);

                });


        /* ===== 背景視差 ===== */

        document
            .addEventListener(
                "mousemove",
                function (e) {

                    let x =
                        e.clientX /
                        window.innerWidth;

                    let y =
                        e.clientY /
                        window.innerHeight;

                    document.body.style.backgroundPosition =
                        (x * 50) + "% " +
                        (y * 50) + "%";

                });

    </script>

</body>

</html>
