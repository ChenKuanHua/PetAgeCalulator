<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>寵物工具箱｜年齡換算與體重紀錄</title>
    <meta name="description" content="可愛互動式寵物工具箱，包含寵物年齡換算與體重紀錄功能，支援 localStorage 儲存資料與寵物名字標籤切換。"/>
    
    <!--  放入這三行開始 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff6b6b" />
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="mask-icon" href="icon-192.png" color="#ff6b6b">
    <!--  放入這三行結束 -->

    <style>
      * {
        box-sizing: border-box;
        font-family: "Microsoft JhengHei", Arial, sans-serif;
      }

      body {
        margin: 0;

        background-image: url("cat3.png");

        background-size: cover;

        background-position: center;

        min-height: 100vh;

        overflow-x: hidden;
      }

      /* =========================
Navbar
========================= */

      .navbar {
        position: sticky;

        top: 0;

        display: flex;

        justify-content: space-between;

        align-items: center;

        padding: 15px 30px;

        background: rgba(255, 255, 255, 0.9);

        backdrop-filter: blur(10px);

        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);

        z-index: 999;
      }

      .logo {
        display: flex;
        align-items: center;
        font-weight: bold;
        font-size: 22px;
        color: #ff6b6b;
        cursor: pointer;
      }

      .logo img {
        width: 40px;
        margin-right: 10px;
      }

      .nav-links a {
        margin-left: 20px;

        text-decoration: none;

        color: #333;

        font-weight: bold;

        transition: 0.2s;
      }

      .nav-links a:hover {
        color: #ff6b6b;
      }

      /* =========================
容器
========================= */

      .container {
        width: 95%;

        max-width: 650px;

        margin: 40px auto;

        padding: 30px;

        border-radius: 25px;

        background: rgba(255, 255, 255, 0.92);

        backdrop-filter: blur(8px);

        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      h1 {
        text-align: center;

        color: #ff6b6b;
      }

      label {
        font-weight: bold;

        margin-top: 15px;

        display: block;
      }

      input,
      select {
        width: 100%;

        padding: 12px;

        margin-top: 8px;

        border-radius: 12px;

        border: 2px solid #ffd6d6;

        font-size: 16px;
      }

      /* =========================
按鈕動畫
========================= */

      button {
        width: 100%;

        padding: 16px;

        margin-top: 20px;

        border: none;

        border-radius: 50px;

        font-size: 18px;

        cursor: pointer;

        color: white;

        background: linear-gradient(135deg, #ff9a9e, #fad0c4);

        box-shadow:
          0 6px 0 #e57373,
          0 10px 20px rgba(0, 0, 0, 0.2);

        transition: 0.15s;
      }

      button:hover {
        transform: scale(1.05);
      }

      button:active {
        transform: scale(0.95);
      }

      .result {
        margin-top: 25px;

        padding: 20px;

        border-radius: 15px;

        background: #fff0f0;

        text-align: center;

        font-size: 20px;

        color: #d6336c;

        display: none;
      }

      /* =========================
表格
========================= */

 
      .table-wrapper {
        overflow-x: auto;

        margin-top: 25px;
      }

      table {
        width: 100%;

        min-width: 450px;

        border-collapse: collapse;

        background: white;
      }

      th,
      td {
        border: 1px solid #ffd6d6;

        padding: 10px;

        text-align: center;
      }

      @media (max-width: 520px) {
        .container {
          padding: 20px;
        }

        input,
        select,
        button {
          font-size: 16px;
        }

        button {
          padding: 14px;
        }

        th,
        td {
          padding: 10px 8px;
          font-size: 14px;
        }

        .nav-links {
          width: 100%;
          margin-top: 10px;
          display: flex;
          flex-wrap: wrap;
          gap: 10px;
        }

        .nav-links a {
          margin-left: 0;
          flex: 1 1 calc(50% - 10px);
          text-align: center;
          padding: 10px 0;
          background: rgba(255, 255, 255, 0.7);
          border-radius: 12px;
        }

        .navbar {
          justify-content: center;
          align-items: flex-start;
          gap: 10px;
        }

        .tabs {
          gap: 6px;
        }
      }

      th {
        background: #ffe4e1;
      }

      /* =========================
頁面切換
========================= */

      .page {
        display: none;
      }

      .page.active {
        display: block;
      }

      /* =========================
體重 Tabs
========================= */

      .tabs {
        display: flex;

        flex-wrap: wrap;

        margin-top: 15px;

        gap: 8px;
      }

      .tab {
        padding: 6px 12px;

        background: #ffe4e1;

        border-radius: 20px;

        cursor: pointer;

        font-size: 14px;
      }

      .tab.active {
        background: #ff6b6b;

        color: white;
      }
    </style>
  </head>

  <body>
    <!-- =========================Navbar========================= -->

    <div class="navbar">
      <div class="logo" onclick="showPage('agePage')">
        <img src="logo.png" alt="寵物網站 Logo" /> 喵工具箱
      </div>

      <div class="nav-links">
        <a href="#" onclick="showPage('agePage')"> 年齡計算 </a>

        <a href="#" onclick="showPage('weightPage')"> 體重紀錄 </a>
      </div>
    </div>

    <!-- =========================年齡計算頁面========================= -->

    <div id="agePage" class="container page active">
      <h1>🐾 寵物年齡換算器</h1>

      <label> 請選擇寵物種類： </label>

      <select id="petType">
        <option value="cat">貓咪</option>

        <option value="dog">狗狗</option>
      </select>

      <label> 請輸入寵物名字： </label>

      <input id="petName" type="text" placeholder="例如：Lucky" />

      <label> 請輸入寵物年齡： </label>

      <input id="age" type="number" />

      <button onclick="calculateAge()">🐾 點我換算</button>

      <div id="result" class="result"></div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>種類</th>
              <th>名字</th>
              <th>年齡</th>
              <th>人類年齡</th>
              <th>時間</th>
            </tr>
          </thead>

          <tbody id="historyTable"></tbody>
        </table>
      </div>

      <button onclick="clearHistory()">清除全部紀錄</button>
    </div>

    <!-- =========================體重紀錄頁面========================= -->

    <div id="weightPage" class="container page">
      <h1>🐶 寵物體重紀錄器</h1>

      <label> 寵物名字： </label>

      <input id="weightName" list="nameList" placeholder="輸入或選擇名字" />

      <datalist id="nameList"> </datalist>

      <label> 體重（kg）： </label>

      <input id="weightValue" type="number" step="0.1" />

      <button onclick="saveWeight()">新增體重紀錄</button>

      <div class="tabs" id="tabs"></div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>日期</th>
              <th>體重</th>
              <th>與上次差異</th>
            </tr>
          </thead>

          <tbody id="weightTable"></tbody>
        </table>
      </div>
    </div>

    <script>
      /* =========================              頁面切換              ========================= */

      function showPage(pageId) {
        document.querySelectorAll(".page").forEach((p) => {
          p.classList.remove("active");
        });

        document.getElementById(pageId).classList.add("active");
      }

      /* =========================              年齡換算              ========================= */

      const STORAGE_KEY = "petAgeHistory";

      function calculateAge() {
        let type = document.getElementById("petType").value;

        let name = document.getElementById("petName").value;

        let age = parseFloat(document.getElementById("age").value);

        if (!name) {
          alert("請輸入名字");

          return;
        }

        if (isNaN(age)) {
          alert("請輸入年齡");

          return;
        }

        let humanAge;

        if (type === "cat") {
          if (age === 1) humanAge = 15;
          else if (age === 2) humanAge = 24;
          else humanAge = 24 + (age - 2) * 4;
        }

        if (type === "dog") {
          if (age === 1) humanAge = 15;
          else if (age === 2) humanAge = 24;
          else humanAge = 24 + (age - 2) * 5;
        }

        document.getElementById("result").style.display = "block";

        document.getElementById("result").innerHTML =
          name + " 約等於 <b>" + Math.round(humanAge) + "</b> 歲";

        saveHistory(
          type,

          name,

          age,

          Math.round(humanAge),
        );

        renderHistory();
      }

      /* =========================              儲存年齡              ========================= */

      function saveHistory(
        type,

        name,

        age,

        humanAge,
      ) {
        let history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

        let now = new Date();

        let time = now.toLocaleString();

        history.push({
          type,

          name,

          age,

          humanAge,

          time,
        });

        localStorage.setItem(
          STORAGE_KEY,

          JSON.stringify(history),
        );
      }

      function renderHistory() {
        let history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

        let table = document.getElementById("historyTable");

        table.innerHTML = "";

        history.forEach((item) => {
          table.innerHTML += `

      <tr>

      <td>
      ${item.type}
      </td>

      <td>
      ${item.name}
      </td>

      <td>
      ${item.age}
      </td>

      <td>
      ${item.humanAge}
      </td>

      <td>
      ${item.time}
      </td>

      </tr>

      `;
        });
      }

      function clearHistory() {
        localStorage.removeItem(STORAGE_KEY);

        renderHistory();
      }

      /* =========================              體重紀錄              ========================= */

      const WEIGHT_KEY = "petWeightHistory";

      let currentPet = null;

      function saveWeight() {
        let name = document.getElementById("weightName").value;

        let weight = parseFloat(document.getElementById("weightValue").value);

        if (!name) {
          alert("請輸入名字");

          return;
        }

        if (isNaN(weight)) {
          alert("請輸入體重");

          return;
        }

        let history = JSON.parse(localStorage.getItem(WEIGHT_KEY)) || {};

        if (!history[name]) {
          history[name] = [];
        }

        let now = new Date();

        let date = now.toLocaleDateString();

        history[name].push({
          date,

          weight,
        });

        localStorage.setItem(
          WEIGHT_KEY,

          JSON.stringify(history),
        );

        currentPet = name;

        renderTabs();

        renderWeightTable();
      }

      /* =========================              建立 Tabs              ========================= */

      function renderTabs() {
        let history = JSON.parse(localStorage.getItem(WEIGHT_KEY)) || {};

        let tabs = document.getElementById("tabs");

        let datalist = document.getElementById("nameList");

        tabs.innerHTML = "";
        datalist.innerHTML = "";

        Object.keys(history).forEach((name) => {
          /* datalist */

          datalist.innerHTML += `
      <option value="${name}">
      `;

          /* tab */

          let tab = document.createElement("div");

          tab.className = "tab";

          if (name === currentPet) {
            tab.classList.add("active");
          }

          tab.innerText = name;

          tab.onclick = () => {
            currentPet = name;

            renderTabs();

            renderWeightTable();
          };

          tabs.appendChild(tab);
        });
      }

      /* =========================              表格              ========================= */

      function renderWeightTable() {
        let history = JSON.parse(localStorage.getItem(WEIGHT_KEY)) || {};

        let table = document.getElementById("weightTable");

        table.innerHTML = "";

        if (!currentPet) return;

        let list = history[currentPet];

        let reversedList = [...list].reverse();

        reversedList.forEach((item, index) => {
          let diff = "-";

          let color = "black";

          /* 找出原本的 index */

          let originalIndex = list.length - 1 - index;

          if (originalIndex > 0) {
            let d = item.weight - list[originalIndex - 1].weight;

            diff = (d > 0 ? "+" : "") + d.toFixed(1);

            /* ===== 顏色判斷 ===== */

            if (d > 0) {
              color = "red";
            } else if (d < 0) {
              color = "blue";
            }
          }

          table.innerHTML += `

      <tr>

      <td>
      ${item.date}
      </td>

      <td>
      ${item.weight}
      </td>

      <td style="color:${color}; font-weight:bold;">
      ${diff}
      </td>

      </tr>`;
        });
      }
      window.onload = function () {
        renderHistory();

        renderTabs();
      };
    </script>
  </body>
</html>
