<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>寵物年齡換算器｜狗狗與貓咪年齡轉換</title>

    <meta name="description" content="可愛手繪風格的寵物年齡換算工具，支援狗狗與貓咪年齡轉換成人類年齡，滿版狗狗與貓咪背景，操作簡單、互動性高，適合手機與電腦使用。">

    <style>
        /* ===== 基本設定 ===== */

        * {
            box-sizing: border-box;
            font-family: "Microsoft JhengHei", Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;

            /* ===== 滿版背景圖 ===== */
            background-image: url("/cat3.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        h1 {
            text-align: center;
            color: #ff6b6b;
            margin-bottom: 20px;
        }

        /* ===== 半透明卡片 ===== */

        .container {
            width: 95%;
            max-width: 480px;

            padding: 30px;

            border-radius: 25px;

            background: rgba(255, 255, 255, 0.85);

            backdrop-filter: blur(8px);

            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        select,
        input {
            width: 100%;
            padding: 12px;
            margin-top: 8px;

            border-radius: 12px;
            border: 2px solid #ffd6d6;

            font-size: 16px;
        }

        /* ===== 手繪風格按鈕 ===== */

        button {
            width: 100%;
            padding: 16px;

            margin-top: 20px;

            border: none;

            border-radius: 50px;

            font-size: 18px;

            cursor: pointer;

            color: white;

            background: linear-gradient(135deg,
                    #ff9a9e,
                    #fad0c4);

            box-shadow:
                0 6px 0 #e57373,
                0 10px 20px rgba(0, 0, 0, 0.2);

            transition: 0.2s;
        }

        /* 按壓效果（像貼紙） */

        button:active {

            transform: translateY(4px);

            box-shadow:
                0 2px 0 #e57373;
        }

        button:hover {

            transform: scale(1.04);
        }

        /* ===== 結果區 ===== */

        .result {

            margin-top: 25px;

            padding: 20px;

            border-radius: 15px;

            background: #fff0f0;

            text-align: center;

            font-size: 20px;

            color: #d6336c;

            display: none;
        }

        .note {

            margin-top: 15px;

            font-size: 14px;

            color: #555;
        }

        /* ===== RWD ===== */

        @media (max-width: 768px) {

            .container {

                padding: 22px;
            }

            h1 {

                font-size: 24px;
            }
        }

        @media (max-width: 320px) {

            button {

                font-size: 16px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>🐾 寵物年齡換算器</h1>

        <!-- 寵物種類 -->

        <label for="petType">
            請選擇寵物種類：
        </label>

        <select id="petType">

            <option value="cat">
                貓咪
            </option>

            <option value="dog">
                狗狗
            </option>

        </select>

        <!-- 狗狗公式 -->

        <label for="dogFormula" id="dogFormulaLabel" style="display:none;">
            狗狗換算方式：
        </label>

        <select id="dogFormula" style="display:none;">

            <option value="normal">
                一般公式（中小型犬）
            </option>

            <option value="science">
                科學公式（DNA 研究）
            </option>

        </select>

        <!-- 年齡 -->

        <label for="age">
            請輸入寵物年齡（歲）：
        </label>

        <input type="number" id="age" min="0" max="50" placeholder="例如：3">

        <!-- 計算按鈕 -->

        <button onclick="calculateAge()">
            🐾 點我幫你換算年齡
        </button>

        <!-- 結果 -->

        <div class="result" id="result">
        </div>

        <div class="note">
            ※ 此為常見估算公式，實際年齡可能因品種與健康狀況不同。
        </div>

    </div>

    <script>

        // 切換狗狗公式顯示

        document
            .getElementById("petType")
            .addEventListener(
                "change",
                function () {

                    let pet =
                        this.value;

                    let dogFormula =
                        document.getElementById(
                            "dogFormula"
                        );

                    let dogLabel =
                        document.getElementById(
                            "dogFormulaLabel"
                        );

                    if (
                        pet === "dog"
                    ) {

                        dogFormula.style.display =
                            "block";

                        dogLabel.style.display =
                            "block";

                    } else {

                        dogFormula.style.display =
                            "none";

                        dogLabel.style.display =
                            "none";

                    }

                }
            );


        function calculateAge() {

            let petType =
                document.getElementById(
                    "petType"
                ).value;

            let age =
                parseFloat(
                    document.getElementById(
                        "age"
                    ).value
                );

            let resultDiv =
                document.getElementById(
                    "result"
                );

            if (
                isNaN(age)
            ) {

                alert(
                    "請輸入正確年齡"
                );

                return;
            }

            let humanAge;

            /* ===== 貓 ===== */

            if (
                petType === "cat"
            ) {

                if (age === 1)
                    humanAge = 15;

                else if (age === 2)
                    humanAge = 24;

                else if (age > 2)
                    humanAge =
                        24 +
                        (age - 2) *
                        4;

                else
                    humanAge =
                        age * 15;

                resultDiv.innerHTML =
                    "🐱 貓咪約等於 <strong>" +
                    Math.round(
                        humanAge
                    ) +
                    "</strong> 歲的人類年齡！";
            }

            /* ===== 狗 ===== */

            if (
                petType === "dog"
            ) {

                let formula =
                    document.getElementById(
                        "dogFormula"
                    ).value;

                if (
                    formula === "normal"
                ) {

                    if (age === 1)
                        humanAge = 15;

                    else if (age === 2)
                        humanAge = 24;

                    else if (age > 2)
                        humanAge =
                            24 +
                            (age - 2) *
                            5;

                    else
                        humanAge =
                            age * 15;

                    resultDiv.innerHTML =
                        "🐶 狗狗約等於 <strong>" +
                        Math.round(
                            humanAge
                        ) +
                        "</strong> 歲的人類年齡！";
                }

                if (
                    formula === "science"
                ) {

                    humanAge =
                        16 *
                        Math.log(age) +
                        31;

                    resultDiv.innerHTML =
                        "🧬 科學公式：約 <strong>" +
                        Math.round(
                            humanAge
                        ) +
                        "</strong> 歲的人類年齡！";
                }

            }

            resultDiv.style.display =
                "block";
        }

    </script>

</body>

</html>
